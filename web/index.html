<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kiosk Controller</title>
  <script>
    const PDF_FILE = "file-sample3.pdf"; // change HERE
    const DELAY_MS = 15000;

    const viewerUrl =
      "web/viewer.html?file=../" + encodeURIComponent(PDF_FILE);

    // Load PDF
    window.location.replace(viewerUrl);

    // Return to controller after delay
    setTimeout(() => {
      window.location.replace("index.html");
    }, DELAY_MS);
  </script>
</head>
<body></body>
</html>
