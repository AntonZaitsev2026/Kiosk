<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kiosk Controller</title>
  <script>
    fetch("config.json?ts=" + Date.now())
      .then(r => r.json())
      .then(cfg => {
        const viewerUrl =
          "web/viewer.html?file=../" +
          encodeURIComponent(cfg.pdf) +
          "&duration=" + cfg.duration;

        window.location.href = viewerUrl;
      });
  </script>
</head>
<body></body>
</html>
